# ⚠ IMPORTANT: these are relative FALLBACK paths for CI/portability.
# They resolve INSIDE the repo dir, which VIOLATES the code-only policy.
# For local development: ALWAYS create config.local.yaml with absolute
# paths (copy from config.local.yaml.example).
# See docs/user/RUN_PATHS_AND_IO_LAYOUT.md § Data Isolation Policy.
paths:
  input_root: "input"
  output_root: "output"

# Output columns for cleaned_spec.xlsx are fixed in excel_writer.py; no output_columns parameter is used.
cleaned_spec:
  include_types:
    - BASE
    - HW
    - SOFTWARE
    - SERVICE
  include_only_present: true

vendor_rules:
  dell: "rules/dell_rules.yaml"
  cisco: "rules/cisco_rules.yaml"
  hpe: "rules/hpe_rules.yaml"
  lenovo: "rules/lenovo_rules.yaml"
  huawei: "rules/huawei_rules.yaml"
  xfusion: "rules/xfusion_rules.yaml"
