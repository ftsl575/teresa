version: "1.0.0"

state_rules:
  absent_keywords: []
  present_override_keywords: []

# ── BASE: CTO rows ──────────────────────────────────────────────────────────
base_rules:
  - field: option_id
    pattern: '(?i)^(?!7S)[A-Z0-9]{4}CTO'
    entity_type: BASE
    rule_id: BASE-L-001

  # Multi-socket / multi-U Base configurations → BASE, server
  - field: option_name
    pattern: '(?i)\b\d+S\s+Base\b|\b\d+[US/]+\d*\s*Base\b.*\bSupporting\b'
    entity_type: BASE
    rule_id: BASE-L-010-MULTI-SOCKET

  # GPU Base — это GPU-шасси/база, не дискретный GPU (PR-4b Theme 4, handoff Q4)
  - field: option_name
    pattern: '(?i)\bGPU\s+Base\b'
    entity_type: BASE
    rule_id: BASE-L-020-GPU-BASE

# ── SERVICE ──────────────────────────────────────────────────────────────────
service_rules:
  - field: option_name
    pattern: '(?i)\b(warranty|support\s+service|premier\s+support|procare)\b'
    entity_type: SERVICE
    rule_id: SERVICE-L-001

  - field: option_name
    pattern: '(?i)^Registration\s+only$'
    entity_type: SERVICE
    rule_id: SERVICE-L-002

# ── LOGISTIC ─────────────────────────────────────────────────────────────────
logistic_rules:
  - field: option_name
    pattern: '(?i)\b(delivery|shipping|freight)\b'
    entity_type: LOGISTIC
    rule_id: LOGISTIC-L-001

# ── SOFTWARE / LICENSE ───────────────────────────────────────────────────────
software_rules:
  - field: option_name
    pattern: '(?i)\bXClarity\b.*\b(FOD|Upgrade)\b'
    entity_type: SOFTWARE
    rule_id: SW-L-001

  - field: option_name
    pattern: '(?i)\bXClarity\s+Controller\s+Platin'
    entity_type: SOFTWARE
    rule_id: SW-L-002

  - field: option_name
    pattern: '(?i)\bFirmware\b.*\b(Root\s+of\s+Trust|Security\s+Module)\b'
    entity_type: SOFTWARE
    rule_id: SW-L-010

  - field: option_name
    pattern: '(?i)\b(License|Licensed)\b'
    entity_type: SOFTWARE
    rule_id: SW-L-020

  # XCC Platinum → SOFTWARE
  - field: option_name
    pattern: '(?i)^XCC\s+Platin'
    entity_type: SOFTWARE
    rule_id: SW-L-003

  # XClarity Pro → SOFTWARE
  - field: option_name
    pattern: '(?i)\bXClarity\s+Pro\b'
    entity_type: SOFTWARE
    rule_id: SW-L-004

  # Intel VROC → SOFTWARE
  - field: option_name
    pattern: '(?i)\bVROC\b'
    entity_type: SOFTWARE
    rule_id: SW-L-030

# ── NOTE ─────────────────────────────────────────────────────────────────────
note_rules:
  - field: option_name
    pattern: '(?i)^(XCC\s+)?Label\b'
    entity_type: NOTE
    rule_id: NOTE-L-001

  - field: option_name
    pattern: '(?i)\bNotice\s+for\b'
    entity_type: NOTE
    rule_id: NOTE-L-002

  - field: option_name
    pattern: '(?i)\bLPK\b'
    entity_type: NOTE
    rule_id: NOTE-L-003

  - field: option_name
    pattern: '(?i)\bPKG\s+BOM\b'
    entity_type: NOTE
    rule_id: NOTE-L-004

  - field: option_name
    pattern: '(?i)^Package\b'
    entity_type: NOTE
    rule_id: NOTE-L-005

  # HDD/NVMe/SATA/SAS/PCIe label rows → NOTE (before HW rules)
  - field: option_name
    pattern: '(?i)\b(HDD|NVMe|SATA|SAS|PCIe)\b.*\bLabels?\d*\b'
    entity_type: NOTE
    rule_id: NOTE-L-010

  # Service/Agency/Branding/Rating/Logo/Lenovo/Sequence labels → NOTE
  - field: option_name
    pattern: '(?i)\b(Service|Agency|Branding|Rating|Logo|Lenovo|Sequence|PSU)\s+.*\bLabels?\b|\bmodel\s+name\s+Labels?\b|\bResponse\s+time\s+.*Labels?\b|\bsmall\s+Lenovo\s+Labels?\b'
    entity_type: NOTE
    rule_id: NOTE-L-020

  # System Documentation, WW Packaging → NOTE
  - field: option_name
    pattern: '(?i)\bSystem\s+Documentation\b|\bWW\s+(?:System\s+)?Packaging\b'
    entity_type: NOTE
    rule_id: NOTE-L-040

  # HDD Type Label / HDD Sequence → NOTE (before HW HDD rule)
  - field: option_name
    pattern: '(?i)\bHDD\s+(?:Type\s+Label\d*|Sequence)\b'
    entity_type: NOTE
    rule_id: NOTE-L-050-HDD-LABEL

  # xU Package / General Config PKG → NOTE
  - field: option_name
    pattern: '(?i)\b\d+U\s+Package\b|\bGeneral\s+Config\s+PKG\b'
    entity_type: NOTE
    rule_id: NOTE-L-060-PKG

  # PSU/Fan/Power Label (at end of string) → NOTE
  - field: option_name
    pattern: '(?i)\b(PSU|Fan|Power)\b.*\bLabel\s*$'
    entity_type: NOTE
    rule_id: NOTE-L-070-LABEL-SUFFIX

  # Standalone / Unconfigured / Auto-Derived items → NOTE
  - field: option_name
    pattern: '(?i)^(?:Standalone|Unconfigured)\s+Items$|^Auto-Derived\s+Part\s+Items$'
    entity_type: NOTE
    rule_id: NOTE-L-030

# ── CONFIG ───────────────────────────────────────────────────────────────────
config_rules:
  - field: option_name
    pattern: '(?i)\bConfiguration\s+(Instruction|ID)\b'
    entity_type: CONFIG
    rule_id: CONFIG-L-001

  - field: option_name
    pattern: '(?i)\bOperating\s+mode\s+selection\b'
    entity_type: CONFIG
    rule_id: CONFIG-L-002

  - field: option_name
    pattern: '(?i)\bData\s+Center\s+Environment\b'
    entity_type: CONFIG
    rule_id: CONFIG-L-003

  - field: option_name
    pattern: '(?i)\bHigh\s+voltage\b'
    entity_type: CONFIG
    rule_id: CONFIG-L-004

  - field: option_name
    pattern: '(?i)\bN[+][N1]\s+Redundancy\b'
    entity_type: CONFIG
    rule_id: CONFIG-L-005

  - field: option_name
    pattern: '(?i)\bDisable\s+IPMI\b'
    entity_type: CONFIG
    rule_id: CONFIG-L-006

  - field: option_name
    pattern: '(?i)\bFeature\s+Enable\s+TPM\b'
    entity_type: CONFIG
    rule_id: CONFIG-L-007

  - field: option_name
    pattern: '(?i)\bPlatform\s+Secure\s+Boot\b'
    entity_type: CONFIG
    rule_id: CONFIG-L-008

  - field: option_name
    pattern: '(?i)\bTrigger\s+MFG\b'
    entity_type: CONFIG
    rule_id: CONFIG-L-009

  - field: option_name
    pattern: '(?i)\bSelect\s+Storage\s+devices\b'
    entity_type: CONFIG
    rule_id: CONFIG-L-010

  - field: option_name
    pattern: '(?i)\bLaser\s+service\s+indicator\b'
    entity_type: CONFIG
    rule_id: CONFIG-L-011

  - field: option_name
    pattern: '(?i)\bMI\s+for\s+PXE\b'
    entity_type: CONFIG
    rule_id: CONFIG-L-012

  - field: option_name
    pattern: '(?i)\bSATA\s+RAID\s+Mode\b'
    entity_type: CONFIG
    rule_id: CONFIG-L-013

  - field: option_name
    pattern: '(?i)\bController\s+0\d\b'
    entity_type: CONFIG
    rule_id: CONFIG-L-014

  - field: option_name
    pattern: '(?i)\bM\.2\s+NVMe\b(?!.*\b(Drive|SSD)\b)'
    entity_type: CONFIG
    rule_id: CONFIG-L-015

  - field: option_name
    pattern: '(?i)\bRAID\s+Configuration\b|\bNon[-\s]RAID\b|\bNon[-\s]Redundant\b|\bGeneral\s+Computing\b'
    entity_type: CONFIG
    rule_id: CONFIG-L-016

  - field: option_name
    pattern: '(?i)^MI-RS\d+'
    entity_type: CONFIG
    rule_id: CONFIG-L-017

# ── HW rules ────────────────────────────────────────────────────────────────
hw_rules:
  # CPU Clip → accessory (before CPU)
  - field: option_name
    pattern: '(?i)\bCPU\b.*\bClip\b'
    entity_type: HW
    rule_id: HW-L-030-CPU-CLIP

  # CPU
  - field: option_name
    pattern: '(?i)\b(Xeon|EPYC|Processor)\b'
    entity_type: HW
    rule_id: HW-L-001-CPU

  # RAM / Memory
  - field: option_name
    pattern: '(?i)\b(RDIMM|TruDDR|DIMM|LRDIMM)\b'
    entity_type: HW
    rule_id: HW-L-002-RAM

  # Blank — Memory Dummy
  - field: option_name
    pattern: '(?i)\bMemory\s+Dummy\b'
    entity_type: HW
    rule_id: HW-L-003-BLANK-MEM

  # Blank — HDD Filler
  - field: option_name
    pattern: '(?i)\bHDD\s+Filler\b'
    entity_type: HW
    rule_id: HW-L-004-BLANK-HDD

  # Blank — any Filler (Riser Filler, Riser Bracket Filler, Cage Filler, etc.)
  - field: option_name
    pattern: '(?i)\bFiller\b'
    entity_type: HW
    rule_id: HW-L-005-BLANK-RISER

  # Blank — SuperCap/Super Cap Holder Dummy, Fan Dummy, PSU Dummy, CPU Dummy, PCIe DUMMY
  - field: option_name
    pattern: '(?i)\bSuper\s*Cap\s+Holder\s+Dummy\b|\b(?:Fan|PSU|CPU\s+\w+)\s+Dummy\b|\bPCIe\s+DUMMY\b|\bCPU\s+Dummy\b'
    entity_type: HW
    rule_id: HW-L-006-BLANK-SCAP

  # BlueField / DPU → nic (before cable + transceiver) — PR-4b Theme 5
  - field: option_name
    pattern: '(?i)\bBlueField(?:-?\d+)?\b'
    entity_type: HW
    rule_id: HW-L-041-BLUEFIELD

  # Network Card / OSFP NIC → nic (before GPU rule to avoid 8-GPU desc collision) — PR-4b Theme 6
  - field: option_name
    pattern: '(?i)\bNetwork\s+Card\b|\bOSFP\s+(?:NIC|Network)\b'
    entity_type: HW
    rule_id: HW-L-042-NETWORK-CARD

  # GPU/CPU/Server Fan (Control) Board / Fan Control Board → fan — PR-4b Theme 7
  - field: option_name
    pattern: '(?i)\b(?:GPU|CPU|Server)\s+Fan\s+(?:Control\s+)?Board\b|\bFan\s+Control\s+Board\b'
    entity_type: HW
    rule_id: HW-L-043-FAN-BOARD

  # PCIe Bracket / Retention Bracket → accessory (before transceiver to avoid QSFP collision) — PR-4b Theme 8
  - field: option_name
    pattern: '(?i)\b(?:PCIe|Retention)\s+Bracket\b'
    entity_type: HW
    rule_id: HW-L-044-BRACKET

  # OCP NIC Interposer Card → nic (PR-4c Theme 10)
  - field: option_name
    pattern: '(?i)\bOCP\s+NIC\s+Interposer\b'
    entity_type: HW
    rule_id: HW-L-046-OCP-NIC-INTERPOSER

  # PCIe Switch Board → accessory (PR-4c Theme 10)
  - field: option_name
    pattern: '(?i)\bPCIe\s+Switch\s+Board\b'
    entity_type: HW
    rule_id: HW-L-047-PCIE-SWITCH-BOARD

  # Flexible Printed Circuit → cable (PR-4c Theme 10)
  - field: option_name
    pattern: '(?i)\bFlexible\s+Printed\s+Circuit\b'
    entity_type: HW
    rule_id: HW-L-048-FPC

  # Cable-Through (before GPU to catch cables with GPU/Riser keywords)
  - field: option_name
    pattern: '(?i)\bCables?\d*\b|\bCBL\b|\bCables\s+Set\b'
    entity_type: HW
    rule_id: HW-L-050-CABLE-THROUGH

  # GPU (before generic HW, exclude Riser)
  - field: option_name
    pattern: '(?i)\b(GPU|NVIDIA\s+HGX)\b(?!.*\bRiser\b)'
    entity_type: HW
    rule_id: HW-L-007-GPU

  # RAID controller (before HBA/NIC, exclude SuperCap)
  - field: option_name
    pattern: '(?i)\bRAID\s+\d{3}(?!.*\bSuperCap\b)'
    entity_type: HW
    rule_id: HW-L-008-RAID

  # M.2 Tray / Interposer / Cage → accessory (before M.2 RAID Adapter)
  - field: option_name
    pattern: '(?i)\bM\.2\b.*\b(Tray|Interposer|Cage)\b'
    entity_type: HW
    rule_id: HW-L-036-M2-ACCESSORY

  # M.2 SATA/NVMe x-Bay Adapter → raid_controller (before M.2 RAID Adapter)
  - field: option_name
    pattern: '(?i)\bM\.2\s+(?:SATA|NVMe).*\d+-Bay\s+Adapter\b'
    entity_type: HW
    rule_id: HW-L-037-M2-BAY-ADAPTER

  # M.2 RAID Adapter
  - field: option_name
    pattern: '(?i)\bM\.2\s+.*\bRAID\b.*\bAdapter\b'
    entity_type: HW
    rule_id: HW-L-009-M2RAID

  # HBA / Emulex / Fibre Channel
  - field: option_name
    pattern: '(?i)\b(HBA|LPe\d+|Fibre\s+Channel)\b'
    entity_type: HW
    rule_id: HW-L-010-HBA

  # NIC / Ethernet Adapter (before transceiver)
  - field: option_name
    pattern: '(?i)\b(Ethernet\s+Adapter|ConnectX|10GbE|25GbE|100GbE|OCP\s+Adapter)\b'
    entity_type: HW
    rule_id: HW-L-011-NIC

  # Transceiver / SFP / QSFP with optional suffix digits
  - field: option_name
    pattern: '(?i)\b(Transceiver|SFP28|SFP\+|QSFP\d*)\b'
    entity_type: HW
    rule_id: HW-L-012-TRANSCEIVER

  # SSD (before generic storage)
  - field: option_name
    pattern: '(?i)\bSSD\b'
    entity_type: HW
    rule_id: HW-L-013-SSD

  # NVMe drive (exclude Cable, RAID, Adapter)
  - field: option_name
    pattern: '(?i)\bNVMe\b(?!.*\b(Cable|RAID|Adapter)\b).*\b(Drive|SSD|HS)\b'
    entity_type: HW
    rule_id: HW-L-014-NVME

  # HDD (exclude Filler, Label, Cage, Sequence)
  - field: option_name
    pattern: '(?i)\bHDD\b(?!.*\b(?:Filler|Cage|Sequence|Labels?\d*)\b)'
    entity_type: HW
    rule_id: HW-L-015-HDD

  # PSU / Power Supply
  - field: option_name
    pattern: '(?i)\bPower\s+Supply\b'
    entity_type: HW
    rule_id: HW-L-016-PSU

  # Power Cord
  - field: option_name
    pattern: '(?i)\b(Jumper\s+Cord|C13\s+to|C19\s+to|Power\s+Cord)\b'
    entity_type: HW
    rule_id: HW-L-017-POWERCORD

  # Fan (module, front, rear, system, option kit)
  - field: option_name
    pattern: '(?i)\b(?:Fan\s+Module|Fan\s+Option\s+Kit|(?:Front|Rear|System|Standard|Dual\s+Rotor\s+System)\s+Fan)\b'
    entity_type: HW
    rule_id: HW-L-018-FAN

  # Heatsink(s)
  - field: option_name
    pattern: '(?i)\bHeatsinks?\b'
    entity_type: HW
    rule_id: HW-L-019-HEATSINK

  # Riser (exclude Filler)
  - field: option_name
    pattern: '(?i)\bRiser\d*\b(?!.*\bFiller\b)'
    entity_type: HW
    rule_id: HW-L-020-RISER

  # Rail (including Fixed Rail)
  - field: option_name
    pattern: '(?i)\b(Slide\s+Rail|Rail\s+Kit|Fixed\s+Rail)\b'
    entity_type: HW
    rule_id: HW-L-021-RAIL

  # Backplane
  - field: option_name
    pattern: '(?i)\bBackplane\b'
    entity_type: HW
    rule_id: HW-L-022-BACKPLANE

  # Bezel (Lenovo codename: Blowing Rock; Security Bezel) → bezel/accessory (PR-4c Theme 9, Q5)
  - field: option_name
    pattern: '(?i)\bBlowing\s+Rock\b|\bSecurity\s+Bezel\b'
    entity_type: HW
    rule_id: HW-L-045-BEZEL

  # Chassis / Cage / Bezel
  - field: option_name
    pattern: '(?i)\b(Chassis|HDD\s+Cage|HD\s+Cage|Media\s+Bay|Bezel)\b'
    entity_type: HW
    rule_id: HW-L-023-CHASSIS

  # TPM
  - field: option_name
    pattern: '(?i)\bTPM\s+\d'
    entity_type: HW
    rule_id: HW-L-024-TPM

  # SAS/SATA/SFF signal cables (before generic Cable)
  - field: option_name
    pattern: '(?i)\b(SAS|SATA|SFF)\b.*\b(to|from)\b'
    entity_type: HW
    rule_id: HW-L-031-SAS-SIGNAL

  # Cable (generic, including plural and numbered)
  - field: option_name
    pattern: '(?i)\bCables?\d*\b'
    entity_type: HW
    rule_id: HW-L-025-CABLE

  # SuperCap Holder (non-Dummy) → accessory (before SuperCap battery rule)
  - field: option_name
    pattern: '(?i)\bSuper\s*Cap\s+Holder\b(?!.*\bDummy\b)'
    entity_type: HW
    rule_id: HW-L-032-SUPERCAP-HOLDER

  # SuperCap / battery (not Dummy/Holder)
  - field: option_name
    pattern: '(?i)\bSuperCap\b(?!.*\b(Holder|Dummy)\b)'
    entity_type: HW
    rule_id: HW-L-026-BATTERY

  # EIA
  - field: option_name
    pattern: '(?i)\bEIA\b'
    entity_type: HW
    rule_id: HW-L-033-EIA

  # Retimer / RoT Module / Root of Trust Module / Enablement Kit → accessory
  - field: option_name
    pattern: '(?i)\b(Retimer|RoT\s+Module|Root\s+of\s+Trust\s+Module|Enablement\s+Kit)\b'
    entity_type: HW
    rule_id: HW-L-034

  # 940 Series Flash Adapter → raid_controller
  - field: option_name
    pattern: '(?i)\b940\s+Series\s+Flash\s+Adapter\b'
    entity_type: HW
    rule_id: HW-L-035

  # Motherboard / System Board / MB / MB W/IO → motherboard (Q1; before accessory catch-all)
  - field: option_name
    pattern: '(?i)\bSystem\s+Board\b|\b(?:Motherboard|Mainboard)\b|\bMB(?:\s+W\/IO)?(?=\s|,|$)'
    entity_type: HW
    rule_id: HW-L-040-MOTHERBOARD

  # Accessory — boards, air duct/baffle, handles, brackets, operator panel, PSU duct, top cover, sponge, screw, etc.
  - field: option_name
    pattern: '(?i)\b(Top\s+Cover|Sponge|Screw|Air\s*(?:Duct|Baffle)|Airduct|Lift\s+Handles?|Front\s+System\s+Handles?|EIA\s+Latch|Operator\s+Panel|PSU\s+Duct|Bracket|CPU\s+Carrier|Sensor\s+Holder|Slot\s+Holder)\b|\b(?:I\/O|Power\s+(?:Distribution|Interface|Interconnect)|Mezzanine|Control|CPU|Sideband\s+Extension)\s+(?:Board|Card)\b'
    entity_type: HW
    rule_id: HW-L-027-ACCESSORY

  # Catch-all MB (standalone)
  - field: option_name
    pattern: '(?i)\bMB\b'
    entity_type: HW
    rule_id: HW-L-028-MB

# ── device_type_rules ────────────────────────────────────────────────────────
device_type_rules:
  applies_to: [HW, LOGISTIC, BASE]
  rules:
    # BASE
    - field: option_id
      pattern: '(?i)^(?!7S)[A-Z0-9]{4}CTO'
      device_type: server
      rule_id: DT-L-001-SERVER

    # Multi-socket / multi-U Base → server
    - field: option_name
      pattern: '(?i)\b\d+S\s+Base\b|\b\d+[US/]+\d*\s*Base\b.*\bSupporting\b'
      device_type: server
      rule_id: DT-L-058-MULTI-SOCKET

    # GPU Base → server (PR-4b Theme 4, handoff Q4)
    - field: option_name
      pattern: '(?i)\bGPU\s+Base\b'
      device_type: server
      rule_id: DT-L-060-GPU-BASE

    # CPU Clip → accessory (before CPU)
    - field: option_name
      pattern: '(?i)\bCPU\b.*\bClip\b'
      device_type: accessory
      rule_id: DT-L-051-CPU-CLIP

    # CPU
    - field: option_name
      pattern: '(?i)\b(Xeon|EPYC|Processor)\b'
      device_type: cpu
      rule_id: DT-L-002-CPU

    # RAM
    - field: option_name
      pattern: '(?i)\b(RDIMM|TruDDR|DIMM|LRDIMM)\b'
      device_type: ram
      rule_id: DT-L-003-RAM

    # BlueField / DPU → nic (PR-4b Theme 5)
    - field: option_name
      pattern: '(?i)\bBlueField(?:-?\d+)?\b'
      device_type: nic
      rule_id: DT-L-041-BLUEFIELD

    # Network Card / OSFP NIC → nic (PR-4b Theme 6)
    - field: option_name
      pattern: '(?i)\bNetwork\s+Card\b|\bOSFP\s+(?:NIC|Network)\b'
      device_type: nic
      rule_id: DT-L-042-NETWORK-CARD

    # Fan Board → fan (PR-4b Theme 7)
    - field: option_name
      pattern: '(?i)\b(?:GPU|CPU|Server)\s+Fan\s+(?:Control\s+)?Board\b|\bFan\s+Control\s+Board\b'
      device_type: fan
      rule_id: DT-L-043-FAN-BOARD

    # PCIe Bracket / Retention Bracket → accessory (PR-4b Theme 8)
    - field: option_name
      pattern: '(?i)\b(?:PCIe|Retention)\s+Bracket\b'
      device_type: accessory
      rule_id: DT-L-044-BRACKET

    # OCP NIC Interposer → nic (PR-4c Theme 10)
    - field: option_name
      pattern: '(?i)\bOCP\s+NIC\s+Interposer\b'
      device_type: nic
      rule_id: DT-L-046-OCP-NIC-INTERPOSER

    # PCIe Switch Board → accessory (PR-4c Theme 10)
    - field: option_name
      pattern: '(?i)\bPCIe\s+Switch\s+Board\b'
      device_type: accessory
      rule_id: DT-L-047-PCIE-SWITCH-BOARD

    # Flexible Printed Circuit → cable (PR-4c Theme 10)
    - field: option_name
      pattern: '(?i)\bFlexible\s+Printed\s+Circuit\b'
      device_type: cable
      rule_id: DT-L-048-FPC

    # Cable-Through (before GPU to catch cables with GPU/Riser keywords)
    - field: option_name
      pattern: '(?i)\bCables?\d*\b|\bCBL\b|\bCables\s+Set\b'
      device_type: cable
      rule_id: DT-L-050-CABLE-THROUGH

    # GPU (exclude Riser)
    - field: option_name
      pattern: '(?i)\b(GPU|NVIDIA\s+HGX)\b(?!.*\bRiser\b)'
      device_type: gpu
      rule_id: DT-L-004-GPU

    # Blank fillers — any Filler keyword plus Memory/SuperCap dummies, PCIe DUMMY, CPU Dummy
    - field: option_name
      pattern: '(?i)\bFiller\b|\bMemory\s+Dummy\b|\bSuper\s*Cap\s+Holder\s+Dummy\b|\b(?:Fan|PSU|CPU\s+\w+)\s+Dummy\b|\bPCIe\s+DUMMY\b|\bCPU\s+Dummy\b'
      device_type: blank_filler
      rule_id: DT-L-005-BLANK

    # RAID controller (exclude SuperCap)
    - field: option_name
      pattern: '(?i)\bRAID\s+\d{3}(?!.*\bSuperCap\b)'
      device_type: raid_controller
      rule_id: DT-L-006-RAID

    # M.2 Tray / Interposer / Cage → accessory (before M.2 RAID Adapter)
    - field: option_name
      pattern: '(?i)\bM\.2\b.*\b(Tray|Interposer|Cage)\b'
      device_type: accessory
      rule_id: DT-L-056-M2-ACCESSORY

    # M.2 SATA/NVMe x-Bay Adapter → raid_controller (before M.2 RAID Adapter)
    - field: option_name
      pattern: '(?i)\bM\.2\s+(?:SATA|NVMe).*\d+-Bay\s+Adapter\b'
      device_type: raid_controller
      rule_id: DT-L-057-M2-BAY-ADAPTER

    # M.2 RAID Adapter
    - field: option_name
      pattern: '(?i)\bM\.2\s+.*\bRAID\b.*\bAdapter\b'
      device_type: raid_controller
      rule_id: DT-L-007-M2RAID

    # HBA / Emulex / Fibre Channel
    - field: option_name
      pattern: '(?i)\b(HBA|LPe\d+|Fibre\s+Channel)\b'
      device_type: hba
      rule_id: DT-L-008-HBA

    # NIC / Ethernet
    - field: option_name
      pattern: '(?i)\b(Ethernet\s+Adapter|ConnectX|10GbE|25GbE|100GbE|OCP\s+Adapter)\b'
      device_type: nic
      rule_id: DT-L-009-NIC

    # Transceiver / SFP / QSFP with optional suffix digits
    - field: option_name
      pattern: '(?i)\b(Transceiver|SFP28|SFP\+|QSFP\d*)\b'
      device_type: transceiver
      rule_id: DT-L-010-TRANSCEIVER

    # SSD
    - field: option_name
      pattern: '(?i)\bSSD\b'
      device_type: storage_ssd
      rule_id: DT-L-011-SSD

    # NVMe drive
    - field: option_name
      pattern: '(?i)\bNVMe\b(?!.*\b(Cable|RAID|Adapter)\b).*\b(Drive|SSD|HS)\b'
      device_type: storage_nvme
      rule_id: DT-L-012-NVME

    # HDD (exclude Filler, Label, Cage, Sequence)
    - field: option_name
      pattern: '(?i)\bHDD\b(?!.*\b(?:Filler|Cage|Sequence|Labels?\d*)\b)'
      device_type: storage_hdd
      rule_id: DT-L-013-HDD

    # PSU
    - field: option_name
      pattern: '(?i)\bPower\s+Supply\b'
      device_type: psu
      rule_id: DT-L-014-PSU

    # Power Cord
    - field: option_name
      pattern: '(?i)\b(Jumper\s+Cord|C13\s+to|C19\s+to|Power\s+Cord)\b'
      device_type: power_cord
      rule_id: DT-L-015-POWERCORD

    # Fan (module, front, rear, system, option kit)
    - field: option_name
      pattern: '(?i)\b(?:Fan\s+Module|Fan\s+Option\s+Kit|(?:Front|Rear|System|Standard|Dual\s+Rotor\s+System)\s+Fan)\b'
      device_type: fan
      rule_id: DT-L-016-FAN

    # Heatsink(s)
    - field: option_name
      pattern: '(?i)\bHeatsinks?\b'
      device_type: heatsink
      rule_id: DT-L-017-HEATSINK

    # Riser
    - field: option_name
      pattern: '(?i)\bRiser\d*\b(?!.*\bFiller\b)'
      device_type: riser
      rule_id: DT-L-018-RISER

    # Rail (including Fixed Rail)
    - field: option_name
      pattern: '(?i)\b(Slide\s+Rail|Rail\s+Kit|Fixed\s+Rail)\b'
      device_type: rail
      rule_id: DT-L-019-RAIL

    # Backplane
    - field: option_name
      pattern: '(?i)\bBackplane\b'
      device_type: backplane
      rule_id: DT-L-020-BACKPLANE

    # Bezel → bezel (PR-4c Theme 9)
    - field: option_name
      pattern: '(?i)\bBlowing\s+Rock\b|\bSecurity\s+Bezel\b'
      device_type: bezel
      rule_id: DT-L-045-BEZEL

    # Chassis / Cage / Bezel
    - field: option_name
      pattern: '(?i)\b(Chassis|HDD\s+Cage|HD\s+Cage|Media\s+Bay|Bezel)\b'
      device_type: chassis
      rule_id: DT-L-021-CHASSIS

    # TPM
    - field: option_name
      pattern: '(?i)\bTPM\s+\d'
      device_type: tpm
      rule_id: DT-L-022-TPM

    # SAS/SATA/SFF signal cables (before generic Cable)
    - field: option_name
      pattern: '(?i)\b(SAS|SATA|SFF)\b.*\b(to|from)\b'
      device_type: cable
      rule_id: DT-L-052-SAS-SIGNAL

    # Cable (generic, including plural and numbered)
    - field: option_name
      pattern: '(?i)\bCables?\d*\b'
      device_type: cable
      rule_id: DT-L-023-CABLE

    # SuperCap Holder (non-Dummy) → accessory (before SuperCap battery rule)
    - field: option_name
      pattern: '(?i)\bSuper\s*Cap\s+Holder\b(?!.*\bDummy\b)'
      device_type: accessory
      rule_id: DT-L-053-SUPERCAP-HOLDER

    # SuperCap = battery
    - field: option_name
      pattern: '(?i)\bSuperCap\b(?!.*\b(Holder|Dummy)\b)'
      device_type: battery
      rule_id: DT-L-024-BATTERY

    # Retimer / RoT Module / Root of Trust Module / Enablement Kit → accessory
    - field: option_name
      pattern: '(?i)\b(Retimer|RoT\s+Module|Root\s+of\s+Trust\s+Module|Enablement\s+Kit)\b'
      device_type: accessory
      rule_id: DT-L-054

    # 940 Series Flash Adapter → raid_controller
    - field: option_name
      pattern: '(?i)\b940\s+Series\s+Flash\s+Adapter\b'
      device_type: raid_controller
      rule_id: DT-L-055

    # Motherboard → motherboard
    - field: option_name
      pattern: '(?i)\bSystem\s+Board\b|\b(?:Motherboard|Mainboard)\b|\bMB(?:\s+W\/IO)?(?=\s|,|$)'
      device_type: motherboard
      rule_id: DT-L-040-MOTHERBOARD

    # Accessory — boards, air duct/baffle, handles, brackets, operator panel, PSU duct, top cover, sponge, screw, etc.
    - field: option_name
      pattern: '(?i)\b(Top\s+Cover|Sponge|Screw|Air\s*(?:Duct|Baffle)|Airduct|Lift\s+Handles?|Front\s+System\s+Handles?|EIA\s+Latch|EIA|Operator\s+Panel|PSU\s+Duct|Bracket|CPU\s+Carrier|Sensor\s+Holder|Slot\s+Holder)\b|\b(?:I\/O|Power\s+(?:Distribution|Interface|Interconnect)|Mezzanine|Control|CPU|Sideband\s+Extension)\s+(?:Board|Card)\b'
      device_type: accessory
      rule_id: DT-L-025-ACCESSORY

# ── hw_type_rules ────────────────────────────────────────────────────────────
hw_type_rules:
  applies_to: [HW]
  device_type_map:
    cpu: cpu
    ram: memory
    gpu: gpu
    storage_nvme: storage_drive
    storage_ssd: storage_drive
    storage_hdd: storage_drive
    raid_controller: storage_controller
    hba: hba
    nic: network_adapter
    transceiver: transceiver
    cable: cable
    psu: psu
    fan: fan
    heatsink: heatsink
    riser: riser
    rail: rail
    backplane: backplane
    chassis: chassis
    motherboard: chassis
    bezel: accessory
    tpm: tpm
    battery: accessory
    blank_filler: blank_filler
    accessory: accessory
    server: server
